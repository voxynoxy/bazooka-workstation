<svg xmlns="http://www.w3.org/2000/svg" width="720" height="170" viewBox="0 0 720 170" role="img" aria-labelledby="title desc">
  <title id="title">Support Bazooka on Solana</title>
  <desc id="desc">A static README card with the Bazooka Solana support wallet.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101820"/>
      <stop offset="100%" stop-color="#1b1230"/>
    </linearGradient>
    <linearGradient id="sol" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14F195"/>
      <stop offset="50%" stop-color="#80ECFF"/>
      <stop offset="100%" stop-color="#9945FF"/>
